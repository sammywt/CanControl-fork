[env]
monitor_speed = 115200
lib_ldf_mode = deep+
lib_deps =
    autowp/autowp-mcp2515@^1.3.1
    dfrobot/DFRobotDFPlayerMini@^1.0.6
    arduino-libraries/Servo@^1.2.2
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    adafruit/Adafruit BNO055@^1.6.3
    adafruit/Adafruit Unified Sensor@^1.1.14
    SPI
    Wire
build_flags = -I${PROJECT_INCLUDE_DIR} -I${PROJECT_INCLUDE_DIR}/low_level -I${PROJECT_INCLUDE_DIR}/motors -DCANCONTROL_MAIN
test_framework = unity
test_filter = test_embedded
test_build_src = yes

[env:uno]
framework = arduino
platform = atmelavr
board = uno
build_flags = ${env.build_flags} -DEXAMPLE_BASIC

[env:uno_queue]
extends = env:uno
build_flags = ${env.build_flags} -DEXAMPLE_QUEUE

[env:mega]
framework = arduino
platform = atmelavr
board = megaatmega2560
build_flags = ${env.build_flags} -DEXAMPLE_BASIC

[env:mega_queue]
extends = env:mega
build_flags = ${env.build_flags} -DEXAMPLE_QUEUE

[env:native]
platform = native
test_framework = unity
test_filter = test_native
test_build_src = no

[env:uno_r4_wifi]
framework = arduino
platform = renesas-ra
board = uno_r4_wifi
monitor_speed = 115200
build_flags = ${env.build_flags} -DEXAMPLE_QUEUE
